name: Deploy

on:
  push:
    branches: [main]
  pull_request:

# Automatically cancel in-progress actions on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

env:
  NODE_OPTIONS: "--max_old_space_size=8192"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Compute preview URL
        if: github.event_name == 'pull_request'
        id: preview-url
        run: |
          BRANCH="${{ github.head_ref }}"
          ALIAS=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | sed 's/^-//' | sed 's/-$//')
          echo "alias=$ALIAS" >> "$GITHUB_OUTPUT"
          echo "url=https://${ALIAS}.previews.docs.astro.build" >> "$GITHUB_OUTPUT"

      - name: Comment deployment in progress
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const previewUrl = '${{ steps.preview-url.outputs.url }}';
            const body = `**Preview deployment**\n\n🔄 Deployment in progress...\n\n${previewUrl}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('**Preview deployment**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Install Tools & Dependencies
        uses: ./.github/actions/install

      - name: Cache Astro build
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: node_modules/.astro
          key: astro-build-${{ hashFiles('src/**') }}
          restore-keys: |
            astro-build-

      - name: Build
        run: pnpm build

      - name: Deploy to production
        if: github.ref == 'refs/heads/main'
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy preview
        if: github.event_name == 'pull_request'
        run: pnpm wrangler versions upload --preview-alias "${{ steps.preview-url.outputs.alias }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Comment deployment complete
        if: github.event_name == 'pull_request'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const previewUrl = '${{ steps.preview-url.outputs.url }}';
            const body = `**Preview deployment**\n\n✅ Deployment complete!\n\n${previewUrl}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('**Preview deployment**'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
