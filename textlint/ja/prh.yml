version: 1
rules:
  # 用語統一

  - expected: アダプター
    pattern: /アダプタ(?!ー)/

  - expected: アーキテクチャ
    pattern: /アーキテクチャー/

  - expected: ビルドする
    pattern: /ビルド(?!する)/

  - expected: コンテンツコレクション
    pattern: /コンテンツコレクションズ?/

  - expected: コントリビューター
    pattern: /コントリビュータ\b/

  - expected: 依存関係
    pattern: /依存\b(?!関係)/

  - expected: フロントマター
    pattern: /フロントマッター/

  - expected: インテグレーション
    pattern: /インテグレーションズ?/

  - expected: アイランド
    pattern: /アイランズ?|アイランドス/

  - expected: ページ
    pattern: /ページャ?/

  - expected: パーシャルハイドレーション
    pattern: /パーシャル・?ハイドレーション/

  - expected: レンダリング
    pattern: /レンダー(?!リング)/

  - expected: ルーティング
    pattern: /ルート(?!ィング)|ルート化/

  # 冗長表現の簡潔化

  - expected: できます
    pattern: /することができます/

  - expected: 使えます
    pattern: /使うことができます/
